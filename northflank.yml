apiVersion: v1.2
kind: Project
metadata:
  name: ai-code-creator
  description: AI-powered Full-Stack Application Generator
spec:
  name: ai-code-creator
  color: "#57637A"
  region: europe-west
  networking:
    allowedIngressProjects: []
    hostAliases:
      enabled: false
---
apiVersion: v1.2
kind: Service
metadata:
  name: ai-code-creator-web
  project: ai-code-creator
spec:
  name: ai-code-creator-web
  type: dockerfile
  dockerfile:
    path: Dockerfile
    buildContext: .
  ports:
    - id: http
      type: http
      port: 3000
      name: HTTP
  replicas: 1
  resources:
    cpu: "0.5"
    memory: 512Mi
  env:
    NODE_ENV: production
  domains:
    - domain: aicodecer.online
      port: http
